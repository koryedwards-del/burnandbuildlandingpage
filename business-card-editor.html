<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burn &amp; Build — Card Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="burnandbuild.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #141414;
      color: #D4D4D4;
      font-family: 'Barlow', sans-serif;
      padding: 24px 20px 64px;
    }

    .editor-bar {
      max-width: 640px;
      margin: 0 auto 24px;
      text-align: center;
    }

    .editor-bar h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8A8A8A;
      margin-bottom: 8px;
    }

    .editor-bar p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .editor-actions button,
    .editor-actions a {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 16px;
      border: 1px solid #2A2A2A;
      background: #1A1A1A;
      color: #FFCC00;
      text-decoration: none;
      cursor: pointer;
    }

    .editor-actions button:hover,
    .editor-actions a:hover { border-color: #FFCC00; }

    .card-viewport {
      display: flex;
      justify-content: center;
      overflow: visible;
    }

    .cards-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      transform-origin: top center;
    }

    @media screen {
      .cards-stage {
        transform: scale(1.72);
        margin-bottom: 2.8in;
      }
    }

    .biz-card {
      width: 3.5in;
      height: 2in;
      background: var(--black);
      border: 1px solid #222;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.55);
      position: relative;
      overflow: hidden;
    }

    .card-front {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.22in 0.28in 0.18in;
      text-align: center;
    }

    .card-front::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--yellow);
    }

    .card-eyebrow {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 0.1in;
    }

    .card-logo {
      width: 1.55in;
      height: auto;
      object-fit: contain;
      display: block;
      margin-bottom: 0.08in;
    }

    .card-tagline {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray-light);
      line-height: 1.35;
      max-width: 2.8in;
    }

    .card-tagline .accent { color: var(--yellow); }

    .card-since {
      position: absolute;
      bottom: 0.14in;
      right: 0.2in;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.45rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-muted);
    }

    .card-back {
      display: grid;
      grid-template-columns: 0.95in 1fr;
      gap: 0.18in;
      padding: 0.22in 0.24in;
      align-items: center;
    }

    .card-back::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--yellow);
    }

    .qr-block {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-block img {
      width: 0.82in;
      height: 0.82in;
      display: block;
      background: #fff;
      padding: 3px;
    }

    .back-copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.06in;
      min-width: 0;
    }

    .back-logo {
      width: 0.52in;
      height: 0.52in;
      object-fit: contain;
      display: block;
    }

    .back-url {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--yellow);
    }

    .back-cta {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-light);
      line-height: 1.2;
    }

    .back-price {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray-heading);
    }

    .back-divider {
      width: 100%;
      height: 1px;
      background: var(--gray-mid);
      margin: 0.02in 0;
    }

    .back-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-light);
    }

    .back-email {
      font-family: var(--font-body);
      font-size: 0.46rem;
      color: var(--gray-muted);
      letter-spacing: 0.02em;
    }

    [contenteditable="true"] {
      outline: none;
      border-radius: 2px;
      cursor: text;
    }

    [contenteditable="true"]:hover {
      box-shadow: 0 0 0 1px rgba(255, 204, 0, 0.35);
    }

    [contenteditable="true"]:focus {
      box-shadow: 0 0 0 2px rgba(255, 204, 0, 0.75);
    }

    .saved-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A;
      border: 1px solid #FFCC00;
      color: #FFCC00;
      font-size: 0.8rem;
      padding: 8px 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .saved-toast.show { opacity: 1; }

    @media print {
      body { background: #fff; padding: 0.5in; }
      .editor-bar, .saved-toast { display: none; }
      .cards-stage {
        transform: none;
        margin-bottom: 0;
        gap: 0.25in;
      }
      .biz-card {
        box-shadow: none;
        border: 1px dashed #ccc;
        break-inside: avoid;
      }
      [contenteditable="true"]:hover,
      [contenteditable="true"]:focus { box-shadow: none; }
    }
  </style>
</head>
<body>

  <header class="editor-bar">
    <h1>Card Editor</h1>
    <p>Click any text on the card to edit it. Changes save in this browser automatically.</p>
    <div class="editor-actions">
      <button type="button" onclick="window.print()">Print card</button>
      <button type="button" id="btn-reset">Reset text</button>
      <a href="business-card-mockup.html">View HTML file</a>
      <a href="business-card.html">View PNG</a>
    </div>
  </header>

  <div class="card-viewport">
    <div class="cards-stage" id="cards-root">
      <div class="biz-card card-front">
        <p class="card-eyebrow" contenteditable="true" data-field="eyebrow">The Premier Body Recomp Diet</p>
        <img class="card-logo" src="img/brand/bblogo.png" alt="Burn &amp; Build" />
        <p class="card-tagline">
          <span class="accent" contenteditable="true" data-field="tagline1">Lose Fat.</span><br />
          <span contenteditable="true" data-field="tagline2">Keep Your Muscle.</span>
        </p>
        <span class="card-since" contenteditable="true" data-field="since">Since 1982</span>
      </div>

      <div class="biz-card card-back">
        <div class="qr-block">
          <img src="img/brand/qr-burnandbuilddiet.png" alt="QR code" />
        </div>
        <div class="back-copy">
          <img class="back-logo" src="img/brand/bblogo.png" alt="" aria-hidden="true" />
          <div class="back-url" contenteditable="true" data-field="url">burnandbuilddiet.com</div>
          <div class="back-cta" contenteditable="true" data-field="cta">Create Your Diet</div>
          <div class="back-price" contenteditable="true" data-field="price">$149 • One-Time Purchase</div>
          <div class="back-divider"></div>
          <div class="back-name" contenteditable="true" data-field="name">KORY EDWARDS</div>
          <div class="back-email" contenteditable="true" data-field="email">kory@burnandbuilddiet.com</div>
        </div>
      </div>
    </div>
  </div>

  <div class="saved-toast" id="toast">Saved</div>

  <script>
    (function () {
      var STORAGE_KEY = 'burnandbuild-card-editor-v1';
      var DEFAULTS = {
        eyebrow: 'The Premier Body Recomp Diet',
        tagline1: 'Lose Fat.',
        tagline2: 'Keep Your Muscle.',
        since: 'Since 1982',
        url: 'burnandbuilddiet.com',
        cta: 'Create Your Diet',
        price: '$149 • One-Time Purchase',
        name: 'KORY EDWARDS',
        email: 'kory@burnandbuilddiet.com'
      };

      var toast = document.getElementById('toast');
      var toastTimer;

      function showToast(msg) {
        toast.textContent = msg || 'Saved';
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 1200);
      }

      function readFields() {
        var data = {};
        document.querySelectorAll('[data-field]').forEach(function (el) {
          data[el.getAttribute('data-field')] = el.textContent.trim();
        });
        return data;
      }

      function writeFields(data) {
        document.querySelectorAll('[data-field]').forEach(function (el) {
          var key = el.getAttribute('data-field');
          if (data[key] != null) el.textContent = data[key];
        });
      }

      function save() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(readFields()));
          showToast('Saved');
        } catch (e) {}
      }

      function load() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) writeFields(JSON.parse(raw));
        } catch (e) {}
      }

      document.querySelectorAll('[contenteditable="true"]').forEach(function (el) {
        el.addEventListener('blur', save);
        el.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        });
      });

      document.getElementById('btn-reset').addEventListener('click', function () {
        if (confirm('Reset all card text to defaults?')) {
          writeFields(DEFAULTS);
          save();
        }
      });

      load();
    })();
  </script>
</body>
</html>
